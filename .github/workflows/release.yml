name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.92.0
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:check-version -- --tag $env:GITHUB_REF_NAME
      - run: pnpm test
      - run: pnpm exec tsc --noEmit
      - run: pnpm build
      - run: cargo test --manifest-path src-tauri/Cargo.toml --lib --locked
      - id: tauri
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: LuckyIsland v__VERSION__
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
      - name: Validate draft assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          gh release download $env:GITHUB_REF_NAME --dir release-assets
          gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$env:GITHUB_REF_NAME" | Out-File -Encoding utf8 release-metadata.json
          $version = node -p "require('./package.json').version"
          pnpm release:validate-assets -- --dir release-assets --version $version --tag $env:GITHUB_REF_NAME --release-metadata release-metadata.json --expected-draft true
      - name: Publish validated stable release
        shell: pwsh
        run: gh release edit $env:GITHUB_REF_NAME --draft=false --latest
      - name: Verify published release
        shell: pwsh
        run: |
          gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$env:GITHUB_REF_NAME" | Out-File -Encoding utf8 release-metadata.json
          $version = node -p "require('./package.json').version"
          pnpm release:validate-assets -- --dir release-assets --version $version --tag $env:GITHUB_REF_NAME --release-metadata release-metadata.json --expected-draft false
